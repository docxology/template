voice:
  mode: adaptive
  typing: |
    Strict type hints on all function signatures. Public infrastructure APIs should
    keep parameter and return types explicit.
  docstrings: |
    Minimal docstrings. Add when behavior, contracts, or edge cases are non-obvious.
  error_handling: |
    No bare excepts. Catch specific exception types; use ``# noqa: BLE001`` only with
    a short comment when a broad catch is required (e.g. stage isolation, optional deps).
  structure: |
    Match the pattern of the file being modified. Thin orchestrators delegate to
    infrastructure or project src/; they do not embed domain algorithms.
  density: |
    Comprehensions preferred where readable.
  testing: |
    No mocks: use real data, temp files, pytest-httpserver, or subprocess. Tests assert
    on computed outputs, not stand-ins.
  enforce:
    bare_excepts: "hold"
    missing_type_hints: "note"
  stats:
    type_hint_rate: 0.86
    bare_except_rate: 0.0
    early_return_rate: 0.04
    docstring_count: 10816
    dominant_docstring_style: "other"
    files_analyzed: 965
