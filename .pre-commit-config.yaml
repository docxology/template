# Pre-commit hooks configuration
#
# Hooks align with GitHub Actions `lint` job (ci.yml):
#   - ruff check + ruff format on `infrastructure/` and `projects/*/src/`
#   - mypy on the same paths (see pyproject.toml [tool.mypy])
# Pre-push: infra-only pytest smoke (single root; avoids overlapping tests.conftest).
#
# Manual: pre-commit run --all-files --hook-stage manual

repos:
  - repo: local
    hooks:
      - id: ruff-ci
        name: ruff check + format (CI scope)
        entry: bash
        args:
          - -eo
          - pipefail
          - -c
          - >-
            uvx ruff check infrastructure/ projects/*/src/ --fix &&
            uvx ruff format infrastructure/ projects/*/src/
        language: system
        pass_filenames: false
        stages: [pre-commit, manual]
        always_run: true
        verbose: true

      - id: mypy-ci
        name: mypy (CI scope)
        entry: bash
        args:
          - -eo
          - pipefail
          - -c
          - uv run mypy infrastructure/ projects/*/src/
        language: system
        pass_filenames: false
        stages: [pre-commit, manual]
        always_run: true
        verbose: true

      - id: pytest-unit
        name: pytest (infra smoke)
        entry: uv
        language: system
        stages: [pre-push, manual]
        args:
          - run
          - pytest
          - tests/infra_tests/
          - -q
          - --maxfail=1
          - --import-mode=importlib
          - "-m"
          - "not slow and not requires_ollama"
        pass_filenames: false
        always_run: true
        verbose: true
