# Pre-commit hooks configuration
#
# Hooks:
#   ruff (pre-commit stage): auto-formats and lints all Python files
#   mypy (pre-commit stage): type checks staged .py files
#   pytest-unit (pre-push stage): runs unit tests on changed files with --maxfail=1
#
# All hooks also run in the manual stage, enabling explicit testing via:
#   pre-commit run --all-files --hook-stage manual

repos:
  # Ruff: extremely fast Python linter & formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.7
    hooks:
      - id: ruff
        name: ruff (format & lint)
        args: [--fix]
        stages: [pre-commit, manual]
        verbose: true
        always_run: true
        pass_filenames: false

  # MyPy: static type checker
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.1
    hooks:
      - id: mypy
        name: mypy (type check)
        args: [--ignore-missing-imports]
        stages: [pre-commit, manual]
        files: \.py$
        verbose: true

  # Pytest unit tests: local hook (uses system Python environment)
  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest (unit tests)
        entry: pytest
        language: system
        stages: [pre-push, manual]
        args: [-m, unit, --maxfail=1]
        files: \.py$
        pass_filenames: true
        verbose: true
