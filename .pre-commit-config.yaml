# Pre-commit hooks — aligned with `.github/workflows/ci.yml` lint job:
#   ruff check + ruff format on `infrastructure/` and `projects/*/src/`
#   mypy on the same paths (see `[tool.mypy]` in pyproject.toml)
#
# Pre-push (fast): no-mocks script + pytest on `tests/infra_tests/git_hook_smoke/` only.
# Full infra tests run in CI (`test-infra`); collecting all of `tests/infra_tests/` here
# is too slow for every push (~thousands of tests).
#
# Manual: `pre-commit run --all-files --hook-stage manual`

repos:
  - repo: local
    hooks:
      - id: ruff-ci
        name: ruff check + format (CI scope)
        entry: bash
        args:
          - -eo
          - pipefail
          - -c
          - >-
            uvx ruff check infrastructure/ projects/*/src/ --fix &&
            uvx ruff format infrastructure/ projects/*/src/
        language: system
        pass_filenames: false
        stages: [pre-commit, manual]
        always_run: true
        verbose: true

      - id: mypy-ci
        name: mypy (CI scope)
        entry: bash
        args:
          - -eo
          - pipefail
          - -c
          - uv run mypy infrastructure/ projects/*/src/
        language: system
        pass_filenames: false
        stages: [pre-commit, manual]
        always_run: true
        verbose: true

      - id: pre-push-quick
        name: verify no mocks + hook smoke pytest
        entry: bash
        args:
          - -eo
          - pipefail
          - -c
          - >-
            export PYTHONDONTWRITEBYTECODE=1 &&
            uv run python scripts/verify_no_mocks.py &&
            uv run pytest tests/infra_tests/git_hook_smoke/
            -q --maxfail=1 --import-mode=importlib
        language: system
        pass_filenames: false
        stages: [pre-push, manual]
        always_run: true
        verbose: true
