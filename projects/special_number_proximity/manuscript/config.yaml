testing:
  max_test_failures: 0
  max_infra_test_failures: 3
  max_project_test_failures: 0

experiment:
  rng_seed: 20260322
  q_max: 120
  n_uniform: 4000
  n_quadratic: 2000
  n_beta: 1000
  beta_a: 0.5
  beta_b: 0.5
  # Radicands for sqrt(k) mod 1 draws (see scripts/proximity_monte_carlo.py)
  quadratic_candidates: [2, 3, 5, 6, 7, 10, 11, 13, 14, 15, 17, 19]
  # If true, constants and pooled reference are evaluated on {x} in [0,1)
  compare_mod1: false
  # Optional extra Q values for JSON block q_sensitivity (same pooled sample)
  q_sensitivity: [30, 60, 120]
  histogram_uniform_cap: 8000
