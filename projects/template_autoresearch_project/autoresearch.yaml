enabled: true
strict: true
topic: "Deterministic AutoResearch readiness in a reproducible template pipeline"
autonomy_level: proposal_only
budget:
  max_iterations: 3
  max_wall_clock_minutes: 20
  max_llm_calls: 0
  max_cost_usd: 0.0
edit_allowlist:
  - projects/template_autoresearch_project/src/
  - projects/template_autoresearch_project/manuscript/
metric_direction: maximize
acceptance_policy: "Accepted ideas require local evidence links and human review."
quality_checks:
  - domain_profile
  - experiment_plan
  - pipeline_contracts
  - evidence_registry
  - artifact_manifest
  - thin_orchestrators
  - method_contracts
  - review_gates
  - benchmark_tasks
  - ai_disclosure
stage_gates:
  - Project Tests
  - Project Analysis
  - Output Validation
  - Copy Outputs
review_gates:
  - name: proposal_review
    required: true
  - name: evidence_review
    required: true
source_manifests:
  - output/reports/evidence_registry.json
benchmark_tasks:
  - id: readiness-smoke
    description: "Confirm the deterministic AutoResearch loop emits graded readiness artifacts."
    grading_output: output/reports/benchmark_readiness_smoke.json
disclosure_required: true
disclosure_text: "AI-assisted AutoResearch"
required_artifacts:
  - output/data/autoresearch_plan.json
  - output/data/autoresearch_loop.json
  - output/data/autoresearch_claims.json
  - output/data/autoresearch_stage_matrix.csv
  - output/data/autoresearch_review_packet.json
  - output/data/research_program.json
  - output/data/idea_ledger.json
  - output/data/run_ledger.json
  - output/data/review_decisions.json
  - output/data/benchmark_scores.json
  - output/data/manuscript_variables.json
  - output/figures/autoresearch_stage_matrix.png
  - output/figures/figure_registry.json
  - output/reports/autoresearch_loop.json
  - output/reports/autoresearch_loop.md
  - output/reports/autoresearch_review_packet.md
  - output/reports/autoresearch_summary.md
  - output/reports/artifact_manifest.json
  - output/reports/benchmark_readiness_smoke.json
