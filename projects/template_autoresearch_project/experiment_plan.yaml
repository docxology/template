conditions:
  - name: majority_class_baseline
    role: reference
    description: Predict the training-set majority label for every held-out sample.
  - name: bounded_ridge_candidate_loop
    role: proposed
    description: Evaluate fixed linear and quadratic ridge-classifier candidates under the iteration budget.
  - name: deferred_candidate_budget_check
    role: variant
    description: Leave candidates beyond the configured budget unevaluated and record them as deferred.
metrics:
  primary:
    name: heldout_accuracy
    direction: maximize
protocol: "Generate the fixed-seed nonlinear binary classification task, evaluate bounded candidate classifiers without external calls, select the highest held-out accuracy with simplicity tie-breaking, then require readiness reports and evidence-linked claims to pass."
expected_figures:
  - fig:ml_candidate_scores
expected_tables:
  - tbl:autoresearch-loop
  - tbl:ml-candidate-ledger
baselines:
  - majority_class_baseline
ablations:
  - deferred_candidate_budget_check
