# fep_lean configuration
# ─────────────────────────────────────────────────────────────────────────────
# Hermes and GAUSS_HOME-related settings are overridden by env (see llm/hermes.py).
# Other blocks (gauss.throttle, orchestration, logging) are documentation or
# future use unless a release note says the pipeline reads them.
# API keys MUST be set via ~/.gauss/.env or OPENROUTER_API_KEY env var.
# Copy this as the baseline; do not commit secrets.

project:
  name: fep_lean
  version: "0.7.0"
  description: "FEP / Active Inference / Bayesian Mechanics Lean4 Formalization"

# ── OpenGauss / GAUSS_HOME ───────────────────────────────────────────────────
gauss:
  # Root dir for sessions, artifacts, logs. Env override: GAUSS_HOME
  home: ~/.gauss
  # Default model for all formalization sessions. Env override: GAUSS_DEFAULT_MODEL
  # NOTE: OpenRouter IDs do NOT include the "openrouter/" prefix
  default_model: "moonshotai/kimi-k2.6"
  # Logging level. Env override: GAUSS_LOG_LEVEL
  log_level: INFO
  # Session source tag
  source: "fep_lean"
  # Invoke native Lean 4 compilation on all outputs
  verify_lean: true
  # Minimum seconds between topic submissions (optional throttle)
  # throttle:
  #   inter_topic_s: 2.0

# ── Orchestration ────────────────────────────────────────────────────────────
orchestration:
  # How many topics to run per batch (for parallel demo)
  batch_size: 5
  # Whether to export per-topic artifacts
  export_artifacts: true
  # Whether to generate a final report
  generate_report: true
  # Output directory for rendered reports
  report_dir: output/reports

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  level: INFO
  format: json
  output: both  # console | file | both

# ── Hermes AI Explanation Layer ─────────────────────────────────────────────
# OpenRouter: one model id per call (`hermes.model`). When enabled: requires
# OPENROUTER_API_KEY; failures raise (no alternate models, no synthetic replies).
# Set `enabled: false` to skip the Hermes assistant turn (e.g. offline runs).
#
# ★ Model ranking for Lean4 / formal math (verified on OpenRouter 2026-04):
#
#   Model ID                                   Context   Strengths
#   ────────────────────────────────────────────────────
#   moonshotai/kimi-k2.6                       262K    ← CURRENT: Moonshot Kimi K2.6, fast instruct
#   moonshotai/kimi-k2-thinking                262K    Reasoning-tuned K2; cheap completions
#   qwen/qwen3-next-80b-a3b-instruct:free      262K    Free, strong reasoning, code+math
#   z-ai/glm-5.1                               203K    ZhipuAI; in _REASONING_MODELS so it gets the 65K/300s budget
#   nvidia/nemotron-3-super-120b-a12b:free     262K    120B MoE, agentic math
#   openai/gpt-oss-120b:free                   131K    OpenAI 120B MoE, configurable CoT
#   nousresearch/hermes-3-llama-3.1-405b:free  131K    Good NL, 8 req/min limit
#   arcee-ai/trinity-large-preview:free        131K    Reasoning-focused
#
# Note: deepseek/deepseek-r1-0528:free is not yet live on OpenRouter (404).
#
# Premium models (best results, paid):
#   anthropic/claude-sonnet-4
#   deepseek/deepseek-r1  (paid version — best reasoning)
#
# Wall-clock timeout is enforced by `_make_request` in `src/llm/hermes.py`
# (worker-thread + `join(timeout=...)`); urllib's per-op timeout alone was
# observed letting GLM-5.1 stalls extend to 10+ minutes.
#
hermes:
  enabled: true
  # api_base_url: "https://openrouter.ai/api/v1"  # optional override (tests use local HTTP)
  # ★ Kimi K2.6 (Moonshot) — 262K context, fast instruct (no extended thinking
  #   phase by default), $0.95/M prompt + $4/M completion. Promoted to primary
  #   on 2026-04 after GLM-5.1 returned empty content under the standard
  #   token+timeout budget.
  model: "moonshotai/kimi-k2.6"
  # Tried in order AFTER `model` (the primary) fails. Primary is NOT repeated here.
  # _FREE_MODEL_CHAIN in hermes.py is used only when this list is empty.
  fallback_models:
    - "moonshotai/kimi-k2-thinking"
    - "qwen/qwen3-next-80b-a3b-instruct:free"
    - "z-ai/glm-5.1"
    - "openai/gpt-oss-120b:free"
    - "nvidia/nemotron-3-super-120b-a12b:free"
    - "nousresearch/hermes-3-llama-3.1-405b:free"
    - "arcee-ai/trinity-large-preview:free"

  # ── Token Budgets ──────────────────────────────────────────
  # Standard models (non-reasoning): direct response generation
  max_tokens: 16384
  timeout_s: 150

  # Reasoning models (DeepSeek-R1, o1, o3): use extended thinking in
  # the 'reasoning' field, which consumes tokens before the actual content.
  # These need a much larger budget to produce full, detailed responses.
  reasoning_max_tokens: 65536
  reasoning_timeout_s: 300

  # Cache TTL for Hermes API responses (hours). Responses are cached in
  # {GAUSS_HOME}/fep_lean_state.db keyed by SHA-256(topic_id:lean_sketch:model:stage).
  # cache_ttl_hours: 24
