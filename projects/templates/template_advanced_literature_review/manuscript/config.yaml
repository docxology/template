# Reproducible Multi-Phase Literature-Review Pipeline Configuration
#
# This public exemplar demonstrates a configured, reproducible literature-review
# pipeline. Its bundled corpus is synthetic; live retrieval, full-text assessment,
# and optional model-backed classification remain explicit, separately gated modes.

paper:
  title: "A Reproducible Multi-Phase Literature-Review Pipeline for Exoplanet Atmospheres"
  subtitle: "Synthetic Fixture Exemplar with Source-Aware Retrieval and Optional LLM Analysis"
  version: "0.1.0"
  date: "" # Auto-generated

authors:
  - name: "Daniel Ari Friedman"
    orcid: "0000-0001-6232-9096"
    email: "daniel@activeinference.institute"
    affiliation: "Active Inference Institute"
    corresponding: true

publication:
  status: draft
  doi_status: "forthcoming"
  doi: ""
  version_doi: ""
  version_record: ""
  github_repository: "docxology/template_advanced_literature_review"
  repository_url: "https://github.com/docxology/template_advanced_literature_review"
