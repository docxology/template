paper:
  title: "Template Madlib: Deterministic Token Injection for Conditional IMRAD Manuscripts"
  subtitle: "A public exemplar for source-owned lexical composition"
  version: "0.1.1"
  date: "2026-06-26"
  cover:
    image: "figures/madlib_cover_overview.png"
    title: "Configuration-to-manuscript audit overview"
    description: "Generated cover visualization showing how YAML declarations become token choices, conditional sections, validation gates, and rendered outputs."

authors:
  - name: "Daniel Ari Friedman"
    orcid: "0000-0001-6232-9096"
    email: "daniel@activeinference.institute"
    affiliation: "Active Inference Institute"
    corresponding: true

publication:
  doi: "10.5281/zenodo.20786638"
  version_doi: "10.5281/zenodo.20786639"
  version_record: "https://zenodo.org/records/20786639"
  github_repository: "docxology/template_madlib"
  repository_url: "https://github.com/docxology/template_madlib"
  repository_label: "docxology/template_madlib"
  journal: ""
  volume: ""
  pages: ""
  year: "2026"

keywords:
  - "madlib generation"
  - "token injection"
  - "conditional manuscripts"
  - "reproducible research"
  - "IMRAD"

metadata:
  license: "MIT"
  language: "en"

render:
  formats:
    pdf: true
    html: true
    slides: true
    docx: false
    epub: false

llm:
  reviews:
    enabled: false
    types: []
  translations:
    enabled: false
    languages: []

testing:
  max_test_failures: 0
  max_infra_test_failures: 0
  max_project_test_failures: 0

analysis:
  scripts:
    - 01_generate_madlib_artifacts.py
    - z_generate_manuscript_variables.py

madlib:
  seed: 431
  composition_depth: "deep"
  hypothesis: "Deterministic lexical injection can generate a complete conditional IMRAD manuscript while preserving token provenance, section intent, and audit-ready method evidence."
  visualizations:
    enabled: true
    configured_field_matrix: true
    section_configuration_heatmap: true
    field_origin_summary: true
    token_injection_flow: true
    section_token_allocation: true
    provenance_trace_map: true
    quality_gate_matrix: true
  section_conditions:
    abstract: true
    introduction: true
    methods: true
    results: true
    discussion: true
    configuration: true
    evaluation: true
    reproducibility: true
    limitations: true
    scope: true
    authoring_contract: true
  section_titles:
    abstract: "Abstract"
    introduction: "Introduction: Lexicon as Data and Manuscript as Build Artifact"
    methods: "Methods: Source-Owned Token Injection and Conditional IMRAD Assembly"
    results: "Results: Provenance, Density, and Resolved Manuscript Surface"
    discussion: "Discussion: Accountability Boundaries for Generated Prose"
    configuration: "Configuration: Schema-Controlled Lexicon, Slots, and Narrative Moves"
    evaluation: "Evaluation: Gate Criteria, QA Probes, and Failure Discovery"
    reproducibility: "Reproducibility: Seeded Regeneration and Artifact Trace"
    limitations: "Limitations: Non-Claims, Misuse Modes, and Human Review"
    scope: "Scope: Related Generators and Responsible Forking"
    authoring_contract: "Authoring Contract: Human Review and Forking Obligations"
  narrative_moves:
    abstract:
      - "state the manuscript-generation problem"
      - "name the deterministic intervention"
      - "summarize the audit surface"
    introduction:
      - "separate playful Mad Lib syntax from research claims"
      - "identify drift between prose and source data"
      - "frame configuration as an inspectable dataset"
      - "position conditional prose as a reproducibility problem"
    methods:
      - "validate config before composition"
      - "declare review scenario and method invariants"
      - "separate explicit YAML fields from loader defaults"
      - "govern lexicon categories as reviewable data"
      - "expand slots through seeded digest selection"
      - "allocate slot choices to enabled manuscript sections"
      - "compose conditional section bodies"
      - "assemble method evidence tables and visual audit figures"
      - "align generated claims with the claim ledger"
      - "emit evidence artifacts before rendering"
      - "verify that no unresolved placeholders remain"
      - "assemble a reviewer packet from regenerated artifacts"
      - "preserve human review before publication claims"
    results:
      - "report token density"
      - "show resolved section coverage"
      - "bind every manuscript token to provenance"
      - "connect the figure and inventory to the same plan"
    discussion:
      - "bound the scholarly claim"
      - "describe useful adaptation cases"
      - "name misuse modes"
      - "preserve human authorship responsibility"
    configuration:
      - "document schema ownership"
      - "show title and switch behavior"
      - "record generated counts from code"
    evaluation:
      - "name readiness criteria"
      - "connect criteria to artifacts"
      - "separate local checks from publication readiness"
      - "make failure probes visible"
    reproducibility:
      - "fix seed and config hash"
      - "write machine-readable artifacts"
      - "rerender through the shared pipeline"
      - "copy outputs only after validation"
    limitations:
      - "state non-claims"
      - "identify misuse modes"
      - "preserve human review"
      - "require domain validators for domain claims"
    scope:
      - "distinguish generation from truth"
      - "limit publication claims"
      - "point to local evidence"
      - "explain responsible forking"
    authoring_contract:
      - "state human responsibilities"
      - "name fork obligations"
      - "connect review to generated evidence"
      - "require domain validators before domain claims"
      - "document fork migration notes"
  method_protocol:
    - name: "Ingest declared manuscript schema"
      action: "Parse paper metadata and the madlib block from manuscript/config.yaml before any prose or figures are composed."
      evidence: "Config validation tests and MadlibConfig construction from the committed YAML."
      output: "MadlibConfig"
    - name: "Declare review scenario"
      action: "Name the manuscript scope, local claim boundary, enabled sections, and intended reviewer handoff before token generation."
      evidence: "section_plan.json, contribution table, and authoring contract rows."
      output: "review scenario"
    - name: "Track field origin"
      action: "Record every supported madlib path as explicit when it appears in YAML or defaulted when the loader supplies it."
      evidence: "configured_field_inventory.json and configured-field origin tests."
      output: "explicit/default path inventory"
    - name: "Govern lexicon categories"
      action: "Reject empty required categories, preserve project-owned optional categories, and treat every lexical list as source data."
      evidence: "Malformed-config tests and lexicon rows in token_inventory.json."
      output: "validated lexicon"
    - name: "Construct digest selection material"
      action: "Combine seed, slot name, category, ordinal, and the full category inventory into a deterministic digest input."
      evidence: "Seed-stability and category-sensitivity tests."
      output: "digest input records"
    - name: "Record selection invariants"
      action: "State the invariant inputs that are allowed to change token choices and the renderer state that is not allowed to affect them."
      evidence: "Token determinism tests and Methods digest prose."
      output: "selection invariant set"
    - name: "Expand slot declarations"
      action: "Resolve every slot count into one or more token choices and assign each selected value to its configured manuscript section."
      evidence: "TokenPlan construction, provenance trace, and section allocation figure."
      output: "TokenPlan"
    - name: "Apply section conditions"
      action: "Evaluate section switches before prose assembly so disabled sections receive explicit disabled-section bodies."
      evidence: "Section-condition tests and output/data/section_plan.json."
      output: "enabled section set"
    - name: "Compose conditional IMRAD bodies"
      action: "Build large-grain section variables from narrative moves, selected tokens, section switches, and local claim boundaries."
      evidence: "Generated manuscript variables and hydrated output/manuscript Markdown."
      output: "section variables"
    - name: "Assemble evidence tables"
      action: "Render method protocol, pipeline phase, design principle, audit rule, token inventory, section plan, and provenance tables from config and TokenPlan."
      evidence: "Composition tests and generated manuscript_variables.json table entries."
      output: "Markdown evidence tables"
    - name: "Align claims with evidence ledger"
      action: "Keep generated method, visualization, and publication-boundary claims tied to config, source modules, generated artifacts, or explicit non-claim boundaries."
      evidence: "data/claim_ledger.yaml and evidence registry validation."
      output: "claim-aligned evidence surface"
    - name: "Generate visual audit surface"
      action: "Write the cover overview, token-injection flow, section allocation, provenance trace, quality gate, and configured-field figures from generated data."
      evidence: "Nonblank figure tests and output/figures/figure_registry.json."
      output: "registered figure set"
    - name: "Emit machine-readable artifacts"
      action: "Write token inventory, section plan, configured-field inventory, injection trace, summary reports, validation inputs, and figure registry."
      evidence: "Artifact-writing tests, artifact manifest, and validation reports."
      output: "output/data, output/reports, and output/figures"
    - name: "Hydrate manuscript shell"
      action: "Write manuscript_variables.json and resolve the source Markdown shells into output/manuscript."
      evidence: "Unresolved-token scan and render validation."
      output: "output/manuscript"
    - name: "Render and validate deliverables"
      action: "Render PDF, HTML, and slides through shared infrastructure, then validate PDFs, Markdown, figure registry, evidence registry, design overlays, and artifact manifest."
      evidence: "Stage 03 render log and Stage 04 validation report."
      output: "validated project output"
    - name: "Assemble reviewer packet"
      action: "Treat hydrated Markdown, rendered PDF, web output, slides, figures, data, reports, validation logs, and copied output statistics as one review packet."
      evidence: "Stage 04 validation report and Stage 05 output_statistics.json."
      output: "review packet"
    - name: "Copy review surface"
      action: "Copy validated deliverables into output/templates/template_madlib only after validation passes."
      evidence: "Stage 05 copy statistics and copied-output validation."
      output: "copied publication-review bundle"
    - name: "Document fork migration"
      action: "Record what downstream authors must change when moving from exemplar token injection to a domain-specific report."
      evidence: "README, STANDALONE notes, manuscript README, Authoring Contract, and claim ledger boundary rows."
      output: "fork migration notes"
  evaluation_criteria:
    - name: "Placeholder resolution"
      target: "No unresolved uppercase manuscript placeholders remain in output/manuscript or rendered web output."
      evidence: "tests/test_manuscript_variables.py and rg unresolved-token scan."
      gate: "pytest"
    - name: "Token provenance coverage"
      target: "Every selected token maps to category, selected value, section, and config pointer."
      evidence: "output/reports/injection_trace.json and output/data/token_inventory.json."
      gate: "analysis"
    - name: "Figure registry integrity"
      target: "Every referenced figure label is present in output/figures/figure_registry.json."
      evidence: "scripts/04_validate_output.py figure registry check."
      gate: "validation"
    - name: "Evidence registry cleanliness"
      target: "Generated manuscript numbers and claims pass the project evidence registry."
      evidence: "output/reports/evidence_registry.json."
      gate: "validation"
    - name: "Copied-output readiness"
      target: "PDF, HTML, slides, figures, data, and reports copy into output/templates/template_madlib."
      evidence: "scripts/05_copy_outputs.py output statistics."
      gate: "copy"
    - name: "Reviewer packet completeness"
      target: "Hydrated Markdown, rendered PDF, web output, slides, figures, data, reports, validation results, and copy statistics are all present for review."
      evidence: "Stage 04 validation report and Stage 05 output_statistics.json."
      gate: "copy"
    - name: "Method-invariant traceability"
      target: "Token choices can be explained only by seed, slot, category, ordinal, and ordered category inventory."
      evidence: "tests/test_tokens.py and generated Methods digest prose."
      gate: "pytest"
  failure_modes:
    - name: "Unresolved placeholder"
      risk: "A source Markdown token is added without a generated variable."
      detection: "Project test scans output/manuscript and rendered web output for uppercase placeholders."
      mitigation: "Add variable generation, tests, and rerun z_generate_manuscript_variables.py before render."
    - name: "Overclaimed generated prose"
      risk: "Generated text implies a standalone DOI, empirical validation, or external release that does not exist."
      detection: "Claim ledger review, publication metadata review, and evidence registry validation."
      mitigation: "Keep publication fields blank and use local-only claim boundaries until evidence exists."
    - name: "Config-source drift"
      risk: "Documentation names a schema feature that source code no longer parses."
      detection: "Config tests instantiate the schema and docs point to generated tables."
      mitigation: "Update config loader, docs, and tests together."
    - name: "Figure provenance gap"
      risk: "A figure is referenced in manuscript output without a registry entry."
      detection: "Stage 04 figure registry validation."
      mitigation: "Emit figure_registry.json from src.analysis before rendering."
    - name: "Domain misuse"
      risk: "A fork treats lexical substitution as evidence for a domain-specific research claim."
      detection: "Failure-mode table, scope text, and downstream domain validators."
      mitigation: "Add domain-specific data, validators, and claim ledgers before making domain claims."
    - name: "Method row drift"
      risk: "The Methods prose describes a protocol row or phase that no longer exists in config."
      detection: "Composition tests, summary report review, and generated method tables."
      mitigation: "Update method_protocol, pipeline_phases, composition prose, and tests together."
    - name: "Field-origin opacity"
      risk: "A rendered field appears configured even though it came from a loader default."
      detection: "configured_field_inventory.json and configured-field summary figures."
      mitigation: "Expose explicit/default counts in the manuscript and review optional defaults before release."
    - name: "Visual-method mismatch"
      risk: "A figure implies a method claim that is not backed by generated data or registry metadata."
      detection: "Figure registry validation, nonblank figure tests, and manual visual QA."
      mitigation: "Generate figures only from config, TokenPlan, and inventory data, then rerun validation."
    - name: "Fork without validators"
      risk: "A downstream project changes vocabulary or claims but keeps only the exemplar's generic gates."
      detection: "Authoring contract review and claim ledger review."
      mitigation: "Add domain validators, domain evidence artifacts, and claim-ledger entries before asserting domain findings."
    - name: "Digest invariant drift"
      risk: "A future edit lets renderer state, file order, or ambient prose influence token selection."
      detection: "Seed-stability, category-sensitivity, and method-invariant tests."
      mitigation: "Keep token selection isolated in src/tokens.py and document allowed digest inputs in Methods."
    - name: "Claim ledger omission"
      risk: "A generated claim appears in prose or documentation without a matching local evidence row or non-claim boundary."
      detection: "Claim ledger review, evidence registry validation, and documentation review."
      mitigation: "Add claim-ledger rows or remove the unsupported claim before rendering copied outputs."
    - name: "Review packet incompleteness"
      risk: "A reviewer receives PDF or HTML without the data, reports, figures, validation output, or copy statistics needed to inspect the method."
      detection: "Stage 05 output statistics and copied-output validation."
      mitigation: "Regenerate Stages 02-05 and include the full copied output surface in review."
    - name: "Fork migration ambiguity"
      risk: "A fork leaves authors unsure which exemplar surfaces must change for a domain-specific manuscript."
      detection: "README, STANDALONE notes, manuscript README, and Authoring Contract review."
      mitigation: "Document required config, source, test, claim-ledger, validator, and pipeline changes before making domain claims."
  design_principles:
    - name: "Configuration owns prose choices"
      rationale: "Reviewers can inspect the declared language surface before generation."
      manuscript_effect: "Large-grain manuscript variables are generated from YAML and project source."
    - name: "Method surface is config-owned"
      rationale: "A fork should change method protocol rows before changing generated Methods prose."
      manuscript_effect: "The Methods tables and body summarize method_protocol and pipeline_phases from YAML."
    - name: "Token choice is deterministic"
      rationale: "A fixed seed and lexicon must produce the same injection plan across reruns."
      manuscript_effect: "Token inventory rows can be regenerated and diffed."
    - name: "Field origin is evidence"
      rationale: "A generated manuscript should distinguish authored YAML fields from loader defaults."
      manuscript_effect: "Configured-field tables and figures report explicit and defaulted paths."
    - name: "Sections are conditional but visible"
      rationale: "Disabled material should be auditable rather than silently absent."
      manuscript_effect: "Every disabled section resolves to an explicit disabled-section body."
    - name: "Visual audit follows data"
      rationale: "Figures should explain the generated method without becoming decorative claims."
      manuscript_effect: "Cover, flow, allocation, provenance, gate, and field-origin figures are regenerated from artifacts."
    - name: "Generated output is disposable"
      rationale: "The durable artifact is the regeneration contract, not hand-edited output files."
      manuscript_effect: "Output Markdown, PDF, HTML, and slides are rebuilt from source inputs."
    - name: "Claim boundaries travel with prose"
      rationale: "Generated text can otherwise imply validation that no artifact supports."
      manuscript_effect: "Contribution, limitation, failure-mode, and authoring tables carry boundary text."
    - name: "Forks must add validators"
      rationale: "Domain claims need domain evidence beyond this exemplar's generic regeneration gates."
      manuscript_effect: "Scope, limitations, and authoring contract require validators before domain claims."
    - name: "Invariants precede rendering"
      rationale: "Readers need to know which inputs are allowed to alter generated tokens before they inspect output."
      manuscript_effect: "Methods names the digest inputs and excludes renderer state from token choice."
    - name: "Diffs are review objects"
      rationale: "Config, token inventory, manuscript variables, figures, and copied outputs should be diffable review surfaces."
      manuscript_effect: "Methods and reproducibility text describe review packet assembly after regeneration."
    - name: "Review packet is a method artifact"
      rationale: "A PDF alone is insufficient evidence for a generated-method exemplar."
      manuscript_effect: "Authoring contract and validation sections treat data, reports, figures, and logs as part of review."
    - name: "Fork migration is part of the method"
      rationale: "A public exemplar should teach authors what must change before domain use."
      manuscript_effect: "Standalone notes, authoring obligations, and claim-ledger boundaries name fork responsibilities."
  pipeline_phases:
    - name: "Schema intake"
      input_artifact: "manuscript/config.yaml"
      transformation: "Load paper metadata and validate the madlib schema before generation."
      output_artifact: "MadlibConfig"
      guard: "config parser tests"
    - name: "Scenario declaration"
      input_artifact: "MadlibConfig"
      transformation: "Summarize local scope, enabled sections, claim boundaries, and review handoff expectations."
      output_artifact: "review scenario"
      guard: "method protocol and contribution table tests"
    - name: "Field-origin inventory"
      input_artifact: "MadlibConfig and raw YAML keys"
      transformation: "Classify supported paths as explicit or defaulted."
      output_artifact: "configured_field_inventory.json"
      guard: "configured-field inventory tests"
    - name: "Lexicon validation"
      input_artifact: "madlib.lexicon and madlib.slots"
      transformation: "Reject empty required categories and slot references to missing categories."
      output_artifact: "validated slot inventory"
      guard: "malformed-config tests"
    - name: "Digest token planning"
      input_artifact: "MadlibConfig"
      transformation: "Hash seed, slot name, category, ordinal, and category inventory."
      output_artifact: "TokenPlan"
      guard: "seed-stability tests"
    - name: "Invariant review"
      input_artifact: "TokenPlan and method protocol"
      transformation: "Confirm allowed token-choice inputs are documented and isolated from renderer state."
      output_artifact: "selection invariant set"
      guard: "token determinism and Methods prose tests"
    - name: "Slot-to-section allocation"
      input_artifact: "TokenPlan"
      transformation: "Assign each selected token to its configured manuscript section."
      output_artifact: "section token counts"
      guard: "provenance and allocation tests"
    - name: "Section composition"
      input_artifact: "TokenPlan and narrative moves"
      transformation: "Build conditional section bodies, titles, and evidence tables."
      output_artifact: "manuscript variable map"
      guard: "placeholder-coverage tests"
    - name: "Evidence table assembly"
      input_artifact: "MadlibConfig and TokenPlan"
      transformation: "Render protocol, phase, audit, token, section, provenance, and configured-field tables."
      output_artifact: "manuscript_variables.json"
      guard: "composition table tests"
    - name: "Claim-ledger alignment"
      input_artifact: "MadlibConfig, generated prose, and data/claim_ledger.yaml"
      transformation: "Check local claims and non-claims against source-owned evidence rows."
      output_artifact: "claim-aligned evidence surface"
      guard: "claim ledger and evidence registry review"
    - name: "Visualization emission"
      input_artifact: "MadlibConfig, TokenPlan, and configured-field inventory"
      transformation: "Generate cover, flow, allocation, provenance, gate, and configured-field figures."
      output_artifact: "output/figures and figure_registry.json"
      guard: "nonblank figure tests"
    - name: "Artifact emission"
      input_artifact: "MadlibConfig and TokenPlan"
      transformation: "Write inventory, section plan, injection trace, summary, cover overview, manuscript figures, and registry."
      output_artifact: "output/data, output/reports, and output/figures"
      guard: "artifact-writing tests"
    - name: "Manuscript hydration"
      input_artifact: "source manuscript shells and manuscript_variables.json"
      transformation: "Resolve large-grain placeholders into output/manuscript."
      output_artifact: "hydrated Markdown manuscript"
      guard: "unresolved-token scan"
    - name: "Render"
      input_artifact: "output/manuscript"
      transformation: "Render PDF, HTML, and slides through the shared template pipeline."
      output_artifact: "output/pdf, output/web, and output/slides"
      guard: "render command"
    - name: "Validate and copy"
      input_artifact: "project output directories"
      transformation: "Validate files, registries, evidence, overlays, and copied deliverables."
      output_artifact: "output/templates/template_madlib"
      guard: "validation and copy commands"
    - name: "Review packet assembly"
      input_artifact: "validated project output and copy statistics"
      transformation: "Group manuscript, web, slides, figures, data, reports, validation results, and copy statistics as the review surface."
      output_artifact: "review packet"
      guard: "copied-output validation"
    - name: "Fork contract documentation"
      input_artifact: "source docs, authoring contract, and claim ledger"
      transformation: "State which config, source, test, validator, and evidence surfaces a fork must change before domain claims."
      output_artifact: "fork migration notes"
      guard: "documentation and claim-ledger tests"
  quality_probes:
    - name: "Method row completeness"
      question: "Does the protocol table cover schema intake, token planning, composition, figures, validation, copy, and review handoff?"
      passing_signal: "method_protocol includes rows for every major pipeline responsibility."
      artifact: "manuscript/config.yaml and output/data/section_plan.json"
    - name: "Field-origin visibility"
      question: "Can a reviewer tell which visible fields were authored and which were defaulted?"
      passing_signal: "Configured-field inventory and summary tables report explicit and defaulted paths."
      artifact: "output/data/configured_field_inventory.json"
    - name: "Placeholder survival"
      question: "Did any source token survive hydration?"
      passing_signal: "No uppercase placeholders are found in generated manuscript or web files."
      artifact: "output/manuscript and output/web"
    - name: "Provenance completeness"
      question: "Can every selected token be traced to a category, section, value, and config key?"
      passing_signal: "The injection trace and token inventory contain one row for each generated token."
      artifact: "output/reports/injection_trace.json"
    - name: "Section-switch observability"
      question: "Does a disabled section resolve to a visible explanation?"
      passing_signal: "Disabled section bodies cite their controlling section condition."
      artifact: "output/data/section_plan.json"
    - name: "Figure registry coverage"
      question: "Does every manuscript figure reference have a generated registry entry?"
      passing_signal: "Figure registry validation passes."
      artifact: "output/figures/figure_registry.json"
    - name: "Method-figure alignment"
      question: "Do method figures describe generated data rather than decorative or unsupported claims?"
      passing_signal: "Figure registry captions, nonblank PNG tests, and manual visual QA align with artifact data."
      artifact: "output/figures"
    - name: "Evidence cleanliness"
      question: "Do generated claims stay within local evidence boundaries?"
      passing_signal: "Evidence registry validation passes without unsupported claims."
      artifact: "output/reports/evidence_registry.json"
    - name: "Fork readiness"
      question: "Does the authoring contract tell downstream forks what to extend before adding domain claims?"
      passing_signal: "Authoring obligations cite config diffs, claim ledger updates, validators, and full reruns."
      artifact: "output/manuscript/10_authoring_contract.md"
    - name: "Copied-output parity"
      question: "Did copied deliverables preserve the validated project output surface?"
      passing_signal: "Copy-stage statistics include PDF, HTML, slides, figures, data, and reports."
      artifact: "output/templates/template_madlib"
    - name: "Digest invariant review"
      question: "Are the allowed token-selection inputs documented and protected by tests?"
      passing_signal: "Methods prose names the digest inputs and token tests prove seed/category sensitivity."
      artifact: "src/tokens.py and output/manuscript/02_methodology.md"
    - name: "Claim-ledger alignment"
      question: "Do method and documentation claims point to config, source, generated artifacts, or explicit non-claim boundaries?"
      passing_signal: "Claim-ledger rows cover expanded method protocol and fork-validator boundaries."
      artifact: "data/claim_ledger.yaml"
    - name: "Review packet completeness"
      question: "Can a reviewer inspect every output surface needed to audit the method?"
      passing_signal: "Copied outputs include manuscript, web, slides, figures, data, reports, validation, and copy statistics."
      artifact: "output/templates/template_madlib and output/reports/output_statistics.json"
    - name: "Fork migration sufficiency"
      question: "Does the documentation tell forks which surfaces to change before adding domain claims?"
      passing_signal: "README, STANDALONE, manuscript README, and Authoring Contract list config, source, test, validator, and claim-ledger obligations."
      artifact: "README.md, STANDALONE.md, manuscript/README.md, and output/manuscript/10_authoring_contract.md"
  authoring_obligations:
    - name: "Review generated claims"
      obligation: "Inspect hydrated manuscript bodies before copied outputs are treated as reader-ready."
      review_surface: "output/manuscript and output/web"
    - name: "Review config diffs"
      obligation: "Treat lexicon, slot, title, move, and section-switch edits as source-data changes."
      review_surface: "manuscript/config.yaml"
    - name: "Extend claim evidence"
      obligation: "Update the claim ledger when generated prose adds a new claim boundary."
      review_surface: "data/claim_ledger.yaml"
    - name: "Add domain validators"
      obligation: "Add tests and validation artifacts before using the template for domain-specific claims."
      review_surface: "tests and output/reports"
    - name: "Rerun the full project path"
      obligation: "Regenerate analysis artifacts, render outputs, validate outputs, and copy deliverables."
      review_surface: "pipeline command logs"
    - name: "Review method invariants"
      obligation: "Confirm changed tokens are explained only by seed, slot, category, ordinal, or category inventory changes."
      review_surface: "src/tokens.py, token_inventory.json, and output/manuscript/02_methodology.md"
    - name: "Assemble reviewer packet"
      obligation: "Provide hydrated manuscript, rendered outputs, figures, data, reports, validation report, and output statistics together."
      review_surface: "output/templates/template_madlib"
    - name: "Write fork migration notes"
      obligation: "Document config, source, test, validator, and claim-ledger changes required by a domain fork."
      review_surface: "README.md, STANDALONE.md, and data/claim_ledger.yaml"
  audit_rules:
    - "Every manuscript placeholder must be generated by source code."
    - "Every generated token choice must carry category and config-key provenance."
    - "Every method protocol row must identify an action, evidence artifact, and output."
    - "Every pipeline phase must identify an input, transformation, output, and guard."
    - "Every visible configured field must be classified as explicit or defaulted."
    - "Every disabled section must resolve to an explicit disabled-section body."
    - "Every figure reference must be backed by a generated figure registry entry."
    - "Every fork that adds domain claims must add domain validators and claim-ledger evidence."
    - "Every publication claim must stay local unless a live DOI or release exists."
    - "Every token-selection explanation must name only seed, slot, category, ordinal, and ordered category inventory as digest inputs."
    - "Every review handoff must include generated data, reports, figures, validation results, and copy statistics alongside PDF or HTML."
    - "Every fork migration note must name config, source, test, validator, pipeline, and claim-ledger obligations."
  contribution_claims:
    - "A Mad Lib manuscript can remain reproducible when the lexicon is treated as data."
    - "Conditional IMRAD section bodies can be rendered without shared renderer changes."
    - "Large-grain manuscript variables can preserve author-readable source files while still producing a complete manuscript."
    - "Token provenance can connect playful lexical substitution to serious publication hygiene."
    - "A generated Methods section can be methodologically useful when protocol rows, phases, figures, and validation gates share one config-owned source."
    - "Configured-field origin tracking can make loader defaults visible enough for reviewers and downstream forks."
    - "Pipeline-owned output regeneration can keep PDF, HTML, slides, data, reports, and copied deliverables aligned without hand-editing generated artifacts."
    - "A generated-method exemplar can make review handoff auditable when the review packet includes source config, data artifacts, figures, validation results, and copy statistics."
    - "Fork migration guidance can reduce overclaiming when it names the source, test, validator, and evidence surfaces that must change before domain use."
