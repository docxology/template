# AutoScientists Coordination Testbed — Exemplar Configuration
# A deterministic, ablatable reference implementation of the coordination
# mechanisms from AutoScientists (arXiv:2605.28655), framed honestly as a
# noise-robustness testbed rather than a performance claim.
#
# This file supplies manuscript metadata (title, authors, DOIs) consumed by the
# renderer (`infrastructure/rendering/_pdf_combined_renderer.py`). The
# `experiment:` block below is a human-readable mirror of the code defaults; it is
# NOT loaded by the analysis scripts (they construct SearchConfig/SyntheticObjective
# directly) — the test `test_config_yaml_experiment_block_mirrors_code_defaults`
# binds the two so the mirror cannot drift.

# Consumed by: `infrastructure/rendering/pdf_renderer.py` and `infrastructure/reporting/pipeline_report_model.py`
paper:
  title: "A Deterministic Testbed for Self-Organizing Agent-Team Coordination"
  subtitle: "Ablatable Mechanisms and Measurable Noise-Robustness under a Matched Experiment Budget"
  version: "1.0.1"
  date: "" # Auto-generated via `infrastructure/validation/output/validator.py` if empty

# Consumed by: `infrastructure.publishing.extract_publication_metadata` (in `infrastructure/publishing/metadata.py`)
authors:
  - name: "Daniel Ari Friedman"
    orcid: "0000-0001-6232-9096"
    email: "daniel@activeinference.institute"
    affiliation: "Active Inference Institute"
    corresponding: true

# Consumed by: `infrastructure.publishing.publish_to_zenodo` (in `infrastructure/publishing/platforms.py`)
publication:
  doi: "10.5281/zenodo.20533669"  # Concept DOI — stable citation
  version_doi: "10.5281/zenodo.20693001" # Latest Zenodo deposit
  version_record: "https://zenodo.org/records/20693001"
  github_repository: "docxology/template_autoscientists"
  year: "2026"

keywords:
  - "agent coordination"
  - "scientific discovery"
  - "noise-band confirmation"
  - "ablation study"
  - "reproducible research"
  - "language-model agents"

metadata:
  license: "MIT"
  language: "en"

# Render format toggles — gate per-renderer in infrastructure/rendering/pipeline.py.
render:
  formats:
    pdf: true
    html: true
    slides: false
    docx: false
    epub: false

# LLM features are off by default: the exemplar renders deterministically with
# no Ollama dependency. The live Hermes proposer is exercised by the opt-in
# `requires_ollama` test, not the rendered pipeline.
llm:
  reviews:
    enabled: false
  translations:
    enabled: false

# ZERO-MOCK TOLERANCE: Any failure blocks manuscript rendering.
testing:
  max_test_failures: 0
  max_infra_test_failures: 0
  max_project_test_failures: 0

# Experimental parameters — a documentation mirror of the code defaults:
# budget/num_teams/confirm_seeds/base_seed/stagnation_window/dead_end_threshold/sigma
# are SearchConfig defaults; dimensions/noise_scale/ripple are SyntheticObjective
# defaults. The analysis scripts (run_search_comparison.py, run_ablation.py) do not
# read this file — they build those objects directly; the mirror is pinned by tests.
experiment:
  budget: 60
  num_teams: 3
  dimensions: 4
  noise_scale: 0.02
  ripple: 0.15
  confirm_seeds: [101, 202, 303]
  base_seed: 7
  stagnation_window: 10
  dead_end_threshold: 3
  sigma: 2.0
