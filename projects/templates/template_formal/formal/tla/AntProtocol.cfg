SPECIFICATION Spec

INVARIANTS
  SafetyInvariant
  EstablishedRequiresHandshaking

\* Liveness properties go under PROPERTIES, not INVARIANTS, in TLA+ .cfg
\* syntax -- TLC checks them against fair infinite behaviors of Spec (see
\* the WF_vars(Ack) /\ WF_vars(AbortHs) conjuncts added to Spec), not just
\* against each individual reachable state.
PROPERTIES
  HandshakeEventuallyResolves

\* "closed" is a deliberately terminal phase (no outgoing Next disjunct);
\* that is a genuine dead end of the protocol, not a spec bug, so TLC's
\* deadlock detector is disabled for this state-machine-level check.
CHECK_DEADLOCK FALSE
