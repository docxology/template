claims:
  - id: sheaf_registry
    statement: Sheaf track registry is present and drives compose order.
    path: manuscript/sheaf/tracks.yaml
    section: methods_sheaf
    tracks: [manuscript, sheaf]
    evidence:
      field: tracks
      predicate: non_empty
  - id: sheaf_manifest
    statement: IMRAD section manifest binds track fragments for composition.
    path: manuscript/sheaf/manifest.yaml
    section: methods_sheaf
    tracks: [manuscript, sheaf]
    evidence:
      field: sections
      predicate: non_empty
  - id: sheaf_coverage_config
    statement: Coverage report and heatmap settings are configurable.
    path: manuscript/sheaf/coverage.yaml
