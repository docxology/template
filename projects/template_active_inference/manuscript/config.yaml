paper:
  title: "Active Inference Multi-Track Exemplar"
  subtitle: "Sheaf-Composed Manuscript with pymdp Sophisticated Inference"
  version: "0.2.0"
  date: ""

authors:
  - name: "Daniel Ari Friedman"
    orcid: "0000-0001-6232-9096"
    email: "daniel@activeinference.institute"
    affiliation: "Active Inference Institute"
    corresponding: true

publication:
  doi: ""
  github_repository: "docxology/template_active_inference"
  transmission_bookends:
    enabled: true
    max_prior_releases: 5
    show_steganography: true

keywords:
  - "active inference"
  - "pymdp"
  - "sophisticated inference"
  - "generalized notation notation"
  - "lean"

metadata:
  license: "MIT"
  language: "en"

render:
  formats:
    pdf: true
    html: true
    slides: false

llm:
  reviews:
    enabled: false
  translations:
    enabled: false

testing:
  max_test_failures: 0

analysis:
  scripts:
    - compose_manuscript.py
    - run_analytical_sweep.py
    - simulate_si_tmaze.py
    - compute_statistics.py
    - generate_figures.py
    - z_generate_manuscript_variables.py

sheaf:
  manifest: manuscript/sheaf/manifest.yaml
  registry: manuscript/sheaf/tracks.yaml
  coverage_config: manuscript/sheaf/coverage.yaml
  composer: scripts/compose_manuscript.py
  figures_config: figures.yaml
  # Row/section counts are registry-backed (structural_counts); do not hard-code here.
