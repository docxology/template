name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Sunday midnight UTC — catches newly-published CVEs without a push
    - cron: "0 0 * * 0"
  workflow_dispatch:
    inputs:
      project:
        description: "Specific project to test (leave blank for all)"
        required: false
        default: ""

# Global minimum permissions; individual jobs override where needed
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  UV_FROZEN: "true"
  MPLBACKEND: Agg

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 — Lint & Type Check
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync

      - name: Ruff lint
        run: uvx ruff check infrastructure/ projects/*/src/

      - name: Ruff format check
        run: uvx ruff format --check infrastructure/ projects/*/src/

      - name: Type checking
        run: uv run mypy infrastructure/ projects/*/src/

# ─────────────────────────────────────────────────────────────────────────────
# Job 2 — No-Mocks Policy Verification
# ─────────────────────────────────────────────────────────────────────────────
  verify-no-mocks:
    name: Verify No Mocks Policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync

      - name: Verify no mock usage in tests
        run: uv run python scripts/verify_no_mocks.py

# ─────────────────────────────────────────────────────────────────────────────
# Job 3 — Infrastructure Tests (matrix: ubuntu + macos × Python 3.10–3.12)
# ─────────────────────────────────────────────────────────────────────────────
  test-infra:
    name: "Infra Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: [verify-no-mocks]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies (dev + optional test groups)
        run: uv sync --group rendering --group monitoring

      - name: Fix macOS socket.getfqdn timeout
        if: runner.os == 'macOS'
        run: sudo scutil --set HostName $(hostname)

      - name: Install pandoc
        uses: pandoc/actions/setup@v1

      - name: Run infrastructure tests
        env:
          COVERAGE_FILE: .coverage.infra
        # macOS runners have socket.getfqdn timeout issues with werkzeug/httpserver
        continue-on-error: ${{ runner.os == 'macOS' }}
        run: >-
          uv run pytest tests/infra_tests/
          --cov=infrastructure
          --cov-report=term-missing
          --cov-report=xml:coverage-infra.xml
          --cov-fail-under=60
          --durations=10
          -m "not requires_ollama"
          --timeout=120

      - name: Upload infrastructure coverage to Codecov
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: coverage-infra.xml
          flags: infrastructure
          name: infra-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

# ─────────────────────────────────────────────────────────────────────────────
# Job 4 — Project Tests (matrix: ubuntu + macos × Python 3.10–3.12)
# ─────────────────────────────────────────────────────────────────────────────
  test-project:
    name: "Project Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: [verify-no-mocks]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies (dev + optional test groups)
        run: uv sync --group rendering --group monitoring --group discopy

      - name: Fix macOS socket.getfqdn timeout
        if: runner.os == 'macOS'
        run: sudo scutil --set HostName $(hostname)

      # One pytest process per project: code_project and fep_lean both use
      # ``tests/conftest.py``, which registers as the same plugin name if collected
      # in a single invocation. fep_lean runs in job ``fep-lean`` (real gauss/lake).
      - name: Run project tests
        env:
          COVERAGE_FILE: .coverage.project
          PYTHONPATH: .
        run: |
          set -euo pipefail
          rm -f .coverage.project coverage-project.xml
          first=1
          for d in projects/*/tests; do
            if [ "$d" = "projects/fep_lean/tests" ]; then
              continue
            fi
            if [ "$first" -eq 1 ]; then
              uv run pytest "$d" \
                -m "not requires_ollama" \
                --cov=projects/code_project/src \
                --cov-report=term-missing \
                --durations=10 \
                --timeout=120
              first=0
            else
              uv run pytest "$d" \
                -m "not requires_ollama" \
                --cov=projects/code_project/src \
                --cov-append \
                --cov-report=term-missing \
                --durations=10 \
                --timeout=120
            fi
          done
          uv run coverage xml -o coverage-project.xml
          uv run coverage report --fail-under=90

      - name: Upload project coverage to Codecov
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: coverage-project.xml
          flags: projects
          name: project-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

# ─────────────────────────────────────────────────────────────────────────────
# Job 4b — fep_lean (real math-inc gauss + elan lake/lean; excluded from matrix above)
# This job uses projects/fep_lean/ paths.  When fep_lean lives under
# projects_in_progress/, the hashFiles guard evaluates to '' and the job
# is skipped.  Promote to projects/ to activate CI:
#   mv projects_in_progress/fep_lean projects/fep_lean
# ─────────────────────────────────────────────────────────────────────────────
  fep-lean:
    name: fep_lean (gauss + lake)
    if: hashFiles('projects/fep_lean/lean/lean-toolchain') != ''
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [verify-no-mocks]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies (dev + optional test groups)
        run: uv sync --group rendering --group monitoring

      - name: Sync fep_lean project (explicit venv + dev extras)
        run: uv sync --directory projects/fep_lean --extra dev

      - name: Install elan (lean + lake)
        run: |
          set -euxo pipefail
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Pin Lean toolchain and warm Lake build
        working-directory: projects/fep_lean/lean
        run: |
          set -euxo pipefail
          TOOLCHAIN=$(tr -d '[:space:]' < lean-toolchain)
          elan override set "$TOOLCHAIN"
          lean --version
          lake --version
          lake build

      - name: Reject sorry in Lean sketches
        working-directory: projects/fep_lean/lean/FepSketches
        run: |
          set -euo pipefail
          SORRY_LINES=$(grep -n 'sorry' fep_all.lean Basic.lean \
            | grep -Ev ':[[:space:]]*--' || true)
          if [ -n "$SORRY_LINES" ]; then
            echo "ERROR: 'sorry' found in non-comment Lean lines:"
            echo "$SORRY_LINES"
            exit 1
          fi
          echo "No sorry in Lean sketches."

      - name: Install Open Gauss CLI
        timeout-minutes: 25
        env:
          OPEN_GAUSS_AUTO_ATTACH: "0"
        run: |
          set -euxo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          git clone --depth 1 https://github.com/math-inc/OpenGauss.git "$RUNNER_TEMP/OpenGauss"
          cd "$RUNNER_TEMP/OpenGauss"
          ./scripts/install.sh --plain --noninteractive --skip-system-packages
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          command -v gauss
          gauss doctor

      - name: Run fep_lean tests (real gauss doctor + lake build)
        working-directory: projects/fep_lean
        env:
          COVERAGE_FILE: ../../.coverage.fep_lean
        run: >-
          uv run pytest tests/
          --timeout=1200
          --cov=src
          --cov-report=term-missing
          --cov-fail-under=89
          --durations=10
          -m "not requires_ollama"

# ─────────────────────────────────────────────────────────────────────────────
# Job 5 — Validate Manuscripts
# ─────────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate Manuscripts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync

      - name: Validate manuscript markdown
        run: >-
          uv run python -m infrastructure.validation.cli markdown
          projects/*/manuscript/

      - name: Verify project imports
        run: |
          uv run python -c "
          from pathlib import Path
          import sys
          import importlib

          # Discover all active project src directories
          projects = [p.parent.name for p in Path('projects').glob('*/src') if p.is_dir()]
          if not projects:
              print('No projects found — skipping import check')
              sys.exit(0)
          for project in projects:
              module_name = f'projects.{project}.src'
              try:
                  importlib.import_module(module_name)
                  print(f'  OK: {module_name}')
              except Exception as e:
                  print(f'  FAIL: {module_name}: {e}')
                  sys.exit(1)
          print(f'All {len(projects)} project(s) imported successfully')
          "

# ─────────────────────────────────────────────────────────────────────────────
# Job 6 — Security Scan
# ─────────────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync

      - name: Dependency audit (pip-audit)
        # continue-on-error: upstream vuln DBs can be intermittently unavailable
        continue-on-error: true
        run: uv run pip-audit

      - name: Code security scan (Bandit MEDIUM+ severity)
        run: >-
          uv run bandit -r -ll
          infrastructure/
          scripts/
          projects/
          --exclude projects_archive,projects_in_progress

# ─────────────────────────────────────────────────────────────────────────────
# Job 7 — Performance Check
# ─────────────────────────────────────────────────────────────────────────────
  performance:
    name: Performance Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test-infra, test-project]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync

      - name: Run import benchmarks
        run: |
          uv run python -c "
          import time
          import sys
          import importlib
          from pathlib import Path

          THRESHOLD_SECONDS = 5.0
          results = {}

          # Infrastructure core
          t0 = time.perf_counter()
          try:
              import infrastructure.core
              results['infrastructure.core'] = time.perf_counter() - t0
          except ImportError as e:
              print(f'SKIP infrastructure.core: {e}')

          # Each active project
          projects = [p.parent.name for p in Path('projects').glob('*/src') if p.is_dir()]
          for project in projects:
              module_name = f'projects.{project}.src'
              t0 = time.perf_counter()
              try:
                  importlib.import_module(module_name)
                  results[module_name] = time.perf_counter() - t0
              except ImportError as e:
                  print(f'SKIP {module_name}: {e}')

          total = sum(results.values())
          print('Import timing:')
          for name, elapsed in results.items():
              print(f'  {elapsed:.3f}s  {name}')
          print(f'Total: {total:.3f}s (threshold: {THRESHOLD_SECONDS}s)')

          if total > THRESHOLD_SECONDS:
              print('ERROR: Import time exceeds threshold')
              sys.exit(1)
          print('Performance check passed')
          "
