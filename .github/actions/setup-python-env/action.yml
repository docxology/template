name: Setup Python env
description: >-
  Shared CI setup: provision uv (with cache) and install Python. Factored out
  of ci.yml so the pinned action SHAs and cache configuration live in one place
  instead of being copy-pasted per job. The caller MUST run actions/checkout
  first — a local composite action's files are only available after checkout.

inputs:
  python-version:
    description: Python version passed to actions/setup-python.
    required: false
    default: "3.12"

runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: true
        cache-dependency-glob: "**/uv.lock"

    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}
